- name: Build APK
        run: |
          echo "Checking project files..."
          ls -la
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "ERROR: gradlew is missing in project"
            exit 1
          fi

on:
  push:
    branches: [ main ]

jobs:
  build:


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission to Gradle
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliStudioPro-APK
          path: app/build/outputs/apk/debug/*.apk
